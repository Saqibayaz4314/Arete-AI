version: '3.8'

services:
  # MongoDB Database Service
  mongodb:
    image: mongo:7.0
    container_name: arete-mongodb
    restart: always
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: interview-master
    volumes:
      - mongo_data:/data/db

  # Backend Express API Service
  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    container_name: arete-backend
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - MONGO_URI=mongodb://mongodb:27017/interview-master
      - JWT_SECRET=arete_super_secret_jwt_key_2026_prod
      - GROQ_API_KEY=${GROQ_API_KEY}
    depends_on:
      - mongodb

  # Frontend Vite Nginx Service
  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ""
    container_name: arete-frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  mongo_data:
