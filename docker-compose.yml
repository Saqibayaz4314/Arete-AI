services:
  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    container_name: arete-backend
    restart: always
    env_file:
      - ./Backend/.env
    ports:
      - "3000:3000"

  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
    container_name: arete-frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend
