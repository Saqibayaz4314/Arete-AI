name: arete-ai
region: nyc
services:
  - name: backend
    source_dir: Backend
    github:
      repo: Saqibayaz4314/Arete-AI
      branch: main
      deploy_on_push: true
    run_command: node server.js
    build_command: npm ci --only=production
    environment_slug: node-js
    instance_size_slug: apps-s-1vcpu-0.5gb
    instance_count: 1
    http_port: 8080
    routes:
      - path: /api
    envs:
      - key: PORT
        value: "8080"
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        scope: RUN_TIME
        type: SECRET
      - key: JWT_SECRET
        scope: RUN_TIME
        type: SECRET
      - key: GROQ_API_KEY
        scope: RUN_TIME
        type: SECRET
      - key: SMTP_HOST
        scope: RUN_TIME
        type: SECRET
      - key: SMTP_PORT
        scope: RUN_TIME
        type: SECRET
      - key: SMTP_EMAIL
        scope: RUN_TIME
        type: SECRET
      - key: SMTP_PASSWORD
        scope: RUN_TIME
        type: SECRET
      - key: FROM_NAME
        value: Arete AI
      - key: FROM_EMAIL
        scope: RUN_TIME
        type: SECRET
      - key: GOOGLE_GENAI_API_KEY
        scope: RUN_TIME
        type: SECRET
      - key: CLIENT_URL
        value: ${APP_URL}

static_sites:
  - name: frontend
    source_dir: Frontend
    github:
      repo: Saqibayaz4314/Arete-AI
      branch: main
      deploy_on_push: true
    build_command: npm ci && npm run build
    output_dir: dist
    routes:
      - path: /
    catchall_document: index.html
    envs:
      - key: VITE_API_URL
        value: ""
