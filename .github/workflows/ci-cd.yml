name: Arete CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  # JOB 1: Audit & Syntax Check
  audit:
    name: 1. Codebase Syntax & Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Validate Backend Syntax
        run: |
          cd Backend
          npm ci || npm install
          node -c server.js
          node -c src/app.js
          node -c src/controllers/auth.controller.js
          node -c src/controllers/interview.controller.js
          node -c src/controllers/evaluation.controller.js
          node -c src/services/ai.service.js

  # JOB 2: Backend Integration Testing
  backend-test:
    name: 2. E2E Backend API Integration Tests
    needs: audit
    runs-on: ubuntu-latest
    services:
      mongodb:
        image: mongo:7.0
        ports:
          - 27017:27017

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Backend Dependencies
        run: |
          cd Backend
          npm ci || npm install

      - name: Run E2E Integration Test Suite
        env:
          PORT: 3000
          MONGO_URI: mongodb://localhost:27017/interview-test-db
          JWT_SECRET: ci_cd_test_jwt_secret_key_12345
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          cd Backend
          npm start &
          sleep 4
          node test_all_flows.js

  # JOB 3: Frontend Build Verification
  frontend-build:
    name: 3. Frontend React Build Test
    needs: audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build Vite App
        env:
          VITE_API_URL: http://localhost:3000
        run: |
          cd Frontend
          npm ci || npm install
          npm run build

  # JOB 4: Docker Production Image Build Check
  docker-build:
    name: 4. Docker Production Build Verification
    needs: [backend-test, frontend-build]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Backend Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./Backend
          file: ./Backend/Dockerfile
          push: false

      - name: Build Frontend Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./Frontend
          file: ./Frontend/Dockerfile
          push: false
